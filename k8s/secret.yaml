# ==============================================================================
# k8s/secret.yaml
# Secret — Dados SENSÍVEIS do ambiente (codificados em Base64)
#
# ⚠  ATENÇÃO DE SEGURANÇA:
#    • Em produção NUNCA commite este arquivo com valores reais no Git.
#    • Use: Sealed Secrets, HashiCorp Vault, AWS Secrets Manager ou
#           kubectl create secret generic (sem arquivo em disco).
#    • O Base64 NÃO é criptografia — é apenas encoding. Qualquer pessoa
#      com acesso ao cluster pode decodificar com: echo "val" | base64 -d
#    • Este arquivo é APENAS para ambiente de desenvolvimento/aprendizado.
#
# Como gerar os valores Base64 (Bash / WSL / Git Bash):
#   echo -n "erp_admin"       | base64   → ZXJwX2FkbWlu
#   echo -n "erp_secret_2026" | base64   → ZXJwX3NlY3JldF8yMDI2
#   echo -n "Admin#2026"      | base64   → QWRtaW4jMjAyNg==
#
# Como é consumido no Deployment:
#   env:
#     - name: DB_PASSWORD
#       valueFrom:
#         secretKeyRef:
#           name: erp-barbershop-secrets   ← nome deste Secret
#           key: db-password               ← chave abaixo
#
# Aplique com:
#   kubectl apply -f k8s/secret.yaml -n erp
# ==============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: erp-barbershop-secrets
  namespace: erp
  labels:
    app: erp-barbershop
    tier: secret
# Opaque = Secret genérico de pares chave-valor (tipo padrão)
# Alternativas: kubernetes.io/tls (certificados), kubernetes.io/dockerconfigjson (registry)
type: Opaque
data:
  # ─── Credenciais do PostgreSQL ────────────────────────────────────────────
  # Valor original : erp_admin
  # Codificado     : echo -n "erp_admin" | base64
  db-username: ZXJwX2FkbWlu

  # Valor original : erp_secret_2026
  # Codificado     : echo -n "erp_secret_2026" | base64
  db-password: ZXJwX3NlY3JldF8yMDI2

  # ─── Credenciais do WildFly Management Console ───────────────────────────
  # Valor original : Admin#2026
  # Codificado     : echo -n "Admin#2026" | base64
  # Restrinja o acesso à porta 9990 via NetworkPolicy em produção!
  wildfly-admin-password: QWRtaW4jMjAyNg==

# ==============================================================================
# ALTERNATIVA MAIS SEGURA (sem arquivo em disco):
#
# kubectl create secret generic erp-barbershop-secrets \
#   --namespace=erp \
#   --from-literal=db-username='erp_admin' \
#   --from-literal=db-password='erp_secret_2026' \
#   --from-literal=wildfly-admin-password='Admin#2026'
# ==============================================================================
